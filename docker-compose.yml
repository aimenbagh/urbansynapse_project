version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: urbansynapse
      POSTGRES_PASSWORD: urbansynapse
      POSTGRES_DB: urbansynapse
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: { context: ./backend, dockerfile: ../infra/docker/backend.Dockerfile }
    env_file: ./backend/.env
    depends_on: [db, redis]
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: { context: ./backend, dockerfile: ../infra/docker/backend.Dockerfile }
    env_file: ./backend/.env
    depends_on: [db, redis]
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

  frontend:
    build: { context: ./frontend, dockerfile: ../infra/docker/frontend.Dockerfile }
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  pgdata:
