[alembic]
script_location = alembic
sqlalchemy.url = postgresql+psycopg2://urbansynapse:urbansynapse@localhost:5432/urbansynapse
[loggers]
keys = root
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = INFO
handlers = console
[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
